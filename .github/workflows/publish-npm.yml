name: Publish npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    name: Publish packages to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org/

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: npm install

      - name: Build packages
        run: npm run build:packages

      - name: Test packages
        run: npm test

      - name: Publish packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail

          publish_workspace() {
            local workspace="$1"
            local package_json="$2"
            local name
            local version

            name="$(node -p "require('./${package_json}').name")"
            version="$(node -p "require('./${package_json}').version")"

            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already exists; skipping."
              return
            fi

            npm publish --workspace "${workspace}" --access public
          }

          publish_workspace "@nami-web/tokens" "packages/tokens/package.json"
          publish_workspace "@nami-web/themes" "packages/themes/package.json"
          publish_workspace "@nami-web/ui" "packages/core/package.json"

      - name: Verify npm and pnpm registry metadata
        run: |
          set -euo pipefail

          wait_for_registry() {
            local package_name="$1"
            local manager="$2"

            for attempt in 1 2 3 4 5 6; do
              if "${manager}" view "${package_name}" version; then
                return
              fi

              echo "${manager} cannot see ${package_name} yet; retry ${attempt}/6."
              sleep 10
            done

            "${manager}" view "${package_name}" version
          }

          wait_for_registry @nami-web/tokens npm
          wait_for_registry @nami-web/themes npm
          wait_for_registry @nami-web/ui npm

          wait_for_registry @nami-web/tokens pnpm
          wait_for_registry @nami-web/themes pnpm
          wait_for_registry @nami-web/ui pnpm
